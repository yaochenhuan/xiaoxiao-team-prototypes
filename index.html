<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/xiaoxiao-team-prototypes/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校校 - 产品原型管理</title>
    <style>
      #__pw_gate {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #fdf2f8 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      }
      #__pw_gate.__pw_hidden { display: none; }
      #__pw_gate .__pw_card {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 20px 60px -10px rgba(79, 70, 229, 0.25);
        padding: 40px 36px;
        width: 360px;
        max-width: calc(100vw - 32px);
        text-align: center;
        border: 1px solid rgba(79, 70, 229, 0.08);
      }
      #__pw_gate .__pw_logo {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 14px;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 700;
      }
      #__pw_gate h1 {
        font-size: 18px;
        font-weight: 600;
        color: #1e293b;
        margin: 0 0 6px;
      }
      #__pw_gate p {
        font-size: 13px;
        color: #64748b;
        margin: 0 0 20px;
      }
      #__pw_gate .__pw_input {
        width: 100%;
        height: 42px;
        padding: 0 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 14px;
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      #__pw_gate .__pw_input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      }
      #__pw_gate .__pw_btn {
        margin-top: 12px;
        width: 100%;
        height: 42px;
        background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.05s, box-shadow 0.15s;
      }
      #__pw_gate .__pw_btn:hover { box-shadow: 0 6px 18px -4px rgba(79, 70, 229, 0.4); }
      #__pw_gate .__pw_btn:active { transform: translateY(1px); }
      #__pw_gate .__pw_err {
        color: #ef4444;
        font-size: 12px;
        margin-top: 8px;
        min-height: 16px;
      }
      #__pw_gate .__pw_hint {
        margin-top: 18px;
        font-size: 11px;
        color: #94a3b8;
      }
    </style>
    <script type="module" crossorigin src="/xiaoxiao-team-prototypes/assets/index-Pt0RxPkM.js"></script>
    <link rel="stylesheet" crossorigin href="/xiaoxiao-team-prototypes/assets/index-C5myBnlq.css">
  </head>
  <body>
    <div id="__pw_gate">
      <div class="__pw_card">
        <div class="__pw_logo">校</div>
        <h1>校校 · 原型管理</h1>
        <p>该站点需要密码才能访问</p>
        <input
          id="__pw_input"
          class="__pw_input"
          type="password"
          placeholder="请输入访问密码"
          autocomplete="off"
          autofocus
        />
        <button id="__pw_btn" class="__pw_btn">进入</button>
        <div id="__pw_err" class="__pw_err"></div>
        <div class="__pw_hint">密码验证后将自动记住，无需重复输入</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var STORAGE_KEY = 'xx_pw_auth_v1';
        // SHA-256(salt + "xiao")，salt = "xiaoxiao_2026"
        var PASSWORD_HASH = '16355fb4e9fdb88bb6712f39a2973950e547b7d511ad05f8275d8f1ec0105f34';
        var SALT = 'xiaoxiao_2026';

        function sha256(str) {
          var data = new TextEncoder().encode(str);
          return crypto.subtle.digest('SHA-256', data).then(function (buf) {
            return Array.from(new Uint8Array(buf))
              .map(function (b) { return b.toString(16).padStart(2, '0'); })
              .join('');
          });
        }

        function unlock() {
          var gate = document.getElementById('__pw_gate');
          if (gate) gate.classList.add('__pw_hidden');
          try { sessionStorage.setItem(STORAGE_KEY, '1'); } catch (e) {}
        }

        function tryAutoLogin() {
          try {
            if (sessionStorage.getItem(STORAGE_KEY) === '1') {
              unlock();
              return true;
            }
          } catch (e) {}
          return false;
        }

        function showError(msg) {
          var el = document.getElementById('__pw_err');
          if (el) el.textContent = msg;
          var input = document.getElementById('__pw_input');
          if (input) {
            input.value = '';
            input.focus();
          }
        }

        function check() {
          var input = document.getElementById('__pw_input');
          if (!input) return;
          var v = input.value;
          sha256(SALT + v).then(function (hash) {
            if (hash === PASSWORD_HASH) {
              unlock();
            } else {
              showError('密码错误，请重试');
            }
          });
        }

        document.addEventListener('DOMContentLoaded', function () {
          if (tryAutoLogin()) return;
          var btn = document.getElementById('__pw_btn');
          var input = document.getElementById('__pw_input');
          if (btn) btn.addEventListener('click', check);
          if (input) {
            input.addEventListener('keydown', function (e) {
              if (e.key === 'Enter') check();
            });
            input.focus();
          }
        });
      })();
    </script>
  </body>
</html>
